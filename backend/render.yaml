services:
  - type: web
    name: novaedge-backend
    runtime: node
    plan: free
    repo: https://github.com/USERNAME/novaedge-backend # Replace with your GitHub Repository URL
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false # Set in dashboard
      - key: JWT_SECRET
        sync: false # Set in dashboard
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
